spring:
  # --- LOCAL CONFIG IMPORT ---
  # Auto-loads application-local.yml when present (gitignored, dev only).
  # `optional:` means prod (Heroku) doesn't error when the file is absent.
  # Avoids needing SPRING_PROFILES_ACTIVE=local in every IDE run config.
  config:
    import: "optional:classpath:application-local.yml"

  # --- DATASOURCE CONFIGURATION (PostgreSQL) ---
  # JDBC_DATABASE_* env vars are REQUIRED. There is intentionally no
  # default — the previous defaults pointed at production RDS, so any
  # local/CI run that forgot to set env vars silently hit prod (and the
  # credentials lived in git history). Local development sets these in
  # application-local.yml (gitignored, auto-imported via spring.config
  # above). Heroku injects them from the Postgres addon.
  #
  # If you see "Failed to determine a suitable driver class" or
  # "Property 'spring.datasource.url' is required but missing", set
  # the three env vars (or copy application-local.example.yml ->
  # application-local.yml and fill in your local DB).
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # Hikari + Postgres timeouts — audit P1-12.
    # statement_timeout=20s, idle_in_transaction=30s.
    # Pool max reverted from 20 -> 10 (2026-06-07): the bump to 20 pushed the
    # Heroku dyno over the 512 MB R14 ceiling under normal traffic. 10 is the
    # pre-audit value and stays within memory budget; raise again only when
    # the dyno tier is bumped.
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:30000}
      connection-init-sql: "SET statement_timeout = '20s'; SET idle_in_transaction_session_timeout = '30s';"

  # --- JPA & HIBERNATE CONFIGURATION ---
  jpa:
    hibernate:
      # Switched 2026-06-05 — verify against Heroku Postgres before public launch.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        default_batch_fetch_size: 50

  # --- FLYWAY (schema migration / DDL drift gate) ---
  # Landed 2026-06-05 (P0-7 in docs/audit/RACE_AUDIT_GAMEPLAN.md). Existing
  # Heroku database is populated, so `baseline-on-migrate: true` +
  # `baseline-version: 1` tells Flyway to stamp the current state as
  # V1 on first run rather than trying to (re-)create tables it already
  # finds. New schema changes from this point forward ship as numbered
  # V{n}__name.sql files under db/migration.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  # --- FILE UPLOAD SIZE LIMIT FIX (CRITICAL FOR 500 ERROR) ---
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # --- REDIS CONFIGURATION (for WebSocket Message Broker) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      ssl: ${REDIS_SSL:false}

  # --- WEBSOCKET CONFIGURATION (kept; plus add standard buffer props) ---
  websocket:
    # If your Java WebSocketConfig reads this, keep it:
    frame-max-message-size: ${WS_FRAME_MAX_BYTES:5242880}

# --- SERVER CONFIGURATION ---
server:
  # preferred in newer Spring Boot over use-forward-headers
  forward-headers-strategy: framework

  # avoids issues with large payloads being swallowed by Tomcat
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 50MB

# --- APPLICATION SPECIFIC PROPERTIES ---
app:
  jwtSecret: ${APP_JWT_SECRET:GGatK92BfXN4f3KYGiQdZkiuPdMna+llVG21n1A9M64=}
  jwtExpirationMs: ${APP_JWT_EXPIRATION_MS:86400000}

# --- SENTRY (crash reporting) ---
# When SENTRY_DSN is unset, the starter is a no-op at runtime — no
# config beyond what's here is needed to fail-quiet on local dev /
# environments without a Sentry project. To activate:
#   1. Create a Sentry project (Java / Spring Boot) at sentry.io
#   2. Copy the DSN
#   3. heroku config:set SENTRY_DSN=<dsn> (or wherever the BE runs)
#   4. Redeploy. Exceptions thrown by controllers start reporting.
# Sample rate kept low so error volume stays bounded; transaction
# tracing disabled by default (we only want exception capture for v1).
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:production}}
  release: ${SENTRY_RELEASE:}
  # Bounded error volume — Sentry quotas are per-event.
  sample-rate: 1.0
  # Disable performance tracing for v1; flip to a small float (e.g.
  # 0.1) once we want endpoint latency data.
  traces-sample-rate: 0.0
  # We don't want to ship request bodies (may contain PII like
  # household demographics, post content, geolocation).
  send-default-pii: false

# --- LOGGING CONFIGURATION ---
logging:
  level:
    org:
      springframework:
        security: ${LOG_SECURITY_LEVEL:INFO}
        messaging: ${LOG_MESSAGING_LEVEL:INFO}
        web:
          socket: ${LOG_WEBSOCKET_LEVEL:INFO}

# --- FIREBASE CONFIGURATION ---
firebase:
  project-id: ${FIREBASE_PROJECT_ID:sitprep-new}

# --- CLOUDFLARE R2 (image storage) ---
# Bucket `sitprep-images` served via custom domain https://sitprepimages.com.
# Server-side per-scope resize tuning lives in r2.media.* below.
r2:
  account-id:        ${R2_ACCOUNT_ID:}
  access-key-id:     ${R2_ACCESS_KEY_ID:}
  secret-access-key: ${R2_SECRET_ACCESS_KEY:}
  bucket-name:       ${R2_BUCKET_NAME:sitprep-images}
  public-base-url:   ${R2_PUBLIC_BASE_URL:https://sitprepimages.com}
  media:
    max-pixels:   ${R2_MEDIA_MAX_PIXELS:30000000}
    jpeg-quality: ${R2_MEDIA_JPEG_QUALITY:0.82}